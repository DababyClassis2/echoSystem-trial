name: echosystem
description: A local share echoSystem application.
publish_to: 'none'
version: 1.2.1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # FIX: Upgraded core state management and navigation packages.
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0

  # FIX: Upgraded utilities for device interaction and theming.
  file_picker: ^8.0.0+1
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flex_color_scheme: ^7.3.1
  
  # FIX: Upgraded notification packages to their latest stable versions.
  flutter_local_notifications: ^17.1.2
  flutter_background_service: ^5.0.5
  awesome_notifications: ^0.9.3+1

  # FIX: Upgraded packages for device info, network, and app metadata.
  device_info_plus: ^10.1.0
  network_info_plus: ^5.0.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  
  # FIX: Upgraded core utilities and format handlers.
  nsd: ^4.0.2
  uuid: ^4.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  open_file: ^3.3.2
  mime: ^1.0.5
  intl: ^0.19.0
  csv: ^6.0.0
  
  # FIX: Upgraded UI and QR code packages.
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # FIX: Upgraded code generators to match runtime dependencies.
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

# FIX: Configuration is correct and verified.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
