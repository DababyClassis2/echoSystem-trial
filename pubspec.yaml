name: echosystem
description: A local share echoSystem application.
publish_to: 'none'
version: 1.2.1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  file_picker: ^8.0.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  shared_preferences: ^2.5.3
  flex_color_scheme: ^7.3.1
  flutter_local_notifications: ^19.5.0
  flutter_background_service: ^5.0.9
  awesome_notifications: ^0.9.3
  device_info_plus: ^10.1.0
  network_info_plus: ^6.0.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.0
  nsd: ^4.0.4
  uuid: ^4.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  open_file: ^3.3.2
  mime: ^1.0.6
  intl: ^0.19.0
  share_plus: ^10.0.0
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

# FIX: Corrected the configuration section name to 'flutter_launcher_icons' and ensured the path is correct.
# This resolves the build failure by providing the correct configuration for the icon generator.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
